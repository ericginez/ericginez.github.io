<!DOCTYPE html>
<html lang="{{ site.lang | default: 'fr-FR' }}">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <meta
    name="description"
    content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}"
  >

  <link
    rel="stylesheet"
    href="{{ '/assets/css/main.css' | relative_url }}"
  >

  {% seo %}
</head>

<body>
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}
</body>
</html>
