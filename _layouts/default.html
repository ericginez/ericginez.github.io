<!DOCTYPE html>
<html lang="{{ site.lang | default: 'fr-FR' }}">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <meta
    name="description"
    content="{{ page.description | default: site.description }}"
  >

  {% seo %}
</head>

<body>
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}">
        {{ site.author.name }}
      </a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>
      © {{ site.time | date: "%Y" }} {{ site.author.name }}
    </p>
  </footer>
</body>
</html>
